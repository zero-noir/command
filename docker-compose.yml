services:
  api:
    build: ./apps/api
    ports: ["8000:8000"]
    env_file: ./apps/api/.env
  web:
    image: node:22-alpine
    working_dir: /app
    volumes: ["./apps/web:/app"]
    command: sh -c "npm install --registry=https://registry.npmjs.org/ && npm run dev -- --host 0.0.0.0"
    ports: ["5173:5173"]
    depends_on: [api]
